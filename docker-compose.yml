# ============================================
# docker-compose.yml — 本地 Docker 一键启动
# ============================================
# 使用方式：
#   docker compose up -d      # 后台启动
#   docker compose down       # 停止
#   docker compose logs -f    # 查看日志

version: "3.8"

services:
  app:
    build: .
    container_name: nexus-ai-engine
    ports:
      - "8001:8000"            # 宿主机 8001 → 容器 8000
    env_file:
      - .env                   # 自动加载 .env 中的环境变量
    volumes:
      - ./uploads:/app/uploads           # 上传文件持久化
      - ./my_vector_db:/app/my_vector_db # 向量数据库持久化
      - ./app/database:/app/app/database # SQLite 数据库持久化
    restart: unless-stopped

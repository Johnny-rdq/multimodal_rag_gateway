<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多模态 RAG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
.md-content p { margin-bottom:0.5em; line-height:1.7; }
.md-content pre { background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:.5rem; }
img.uploaded { max-width:200px; max-height:200px; border-radius:.5rem; border:2px solid #6366f1; }
</style>
</head>
<body class="h-screen flex flex-col bg-gray-100">

<div class="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm">
  <h1 class="text-lg font-bold">🖼 多模态 RAG</h1>
  <label class="cursor-pointer bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">
    📷 上传图片
    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="uploadImage()">
  </label>
</div>

<div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
  <div class="text-center text-gray-400 mt-20">
    <div class="text-5xl mb-4">🖼️</div>
    <p>上传一张图片，然后提问</p>
  </div>
</div>

<div class="p-4 bg-white border-t">
  <div class="max-w-3xl mx-auto flex gap-2">
    <textarea id="user-input" class="flex-1 border rounded-xl px-4 py-3 resize-none focus:ring-2 focus:ring-indigo-400 outline-none" rows="1" placeholder="对图片提问...（Enter 发送）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button onclick="sendMessage()" id="send-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700 disabled:bg-gray-300" disabled>发送</button>
  </div>
</div>

<script>
let currentImagePath = '';
let isLoading = false;
const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim() || isLoading; });

function appendMessage(role, text, imageSrc) {
    if (chatBox.querySelector('.text-center')) chatBox.innerHTML = '';
    const div = document.createElement('div');
    div.className = `flex ${role==='user'?'justify-end':'justify-start'}`;
    let html = '';
    if (role === 'user') {
        html = `<div class="max-w-[75%] bg-indigo-600 text-white px-4 py-3 rounded-2xl rounded-tr-none shadow"><div class="whitespace-pre-wrap">${escHtml(text)}</div></div>`;
        if (imageSrc) html = `<img src="${imageSrc}" class="uploaded mb-2">` + html;
    } else {
        html = `<div class="max-w-[85%] bg-white px-5 py-3 rounded-2xl rounded-tl-none shadow border"><div class="md-content">${marked.parse(text)}</div></div>`;
    }
    div.innerHTML = html;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function appendAssistantBubble() {
    if (chatBox.querySelector('.text-center')) chatBox.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'flex justify-start';
    div.innerHTML = `<div class="max-w-[85%] bg-white px-5 py-3 rounded-2xl rounded-tl-none shadow border"><div class="md-content"><span class="text-gray-400">思考中...</span></div></div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div.querySelector('.md-content');
}

async function uploadImage() {
    const file = document.getElementById('file-input').files[0];
    if (!file) return;
    const formData = new FormData(); formData.append('file', file);
    appendMessage('user', '上传了图片：' + file.name, URL.createObjectURL(file));
    try {
        const res = await fetch('/api/upload', { method:'POST', body:formData });
        const data = await res.json();
        currentImagePath = data.image_path;
        appendMessage('assistant', '✅ 图片已上传，请对图片提问');
    } catch(e) {
        appendMessage('assistant', '⚠️ 上传失败: ' + e.message);
    }
}

async function sendMessage() {
    const query = input.value.trim();
    if (!query || isLoading) return;
    isLoading = true; sendBtn.disabled = true;
    appendMessage('user', query);
    input.value = '';
    const contentDiv = appendAssistantBubble();

    try {
        const res = await fetch('/api/chat', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ query, session_id:'default', image_path: currentImagePath })
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let text = '', buffer = '';
        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream:true});
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
                if (!line.trim()) continue;
                if (line.startsWith('data: [SOURCE]:')) continue;
                if (line.startsWith('data: [STATUS]:') || line.startsWith('data: [THINKING]:')) {
                    contentDiv.innerHTML = '<span class="text-gray-400">' + escHtml(line.substring(16)) + '</span>';
                } else if (line.startsWith('data: ')) {
                    text += line.substring(6);
                    contentDiv.innerHTML = marked.parse(text);
                }
            }
        }
    } catch(e) {
        contentDiv.innerHTML = '<span class="text-red-500">⚠️ 连接失败: ' + escHtml(e.message) + '</span>';
    }
    isLoading = false; sendBtn.disabled = !input.value.trim();
}

function escHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
</script>
</body>
</html>
